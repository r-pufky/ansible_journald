---
###############################################################################
# Journald
###############################################################################
# Just set the configuration file.
#
# Reference:
# * https://manpages.debian.org/trixie/systemd/journald.conf.5.en.html

- name: 'Config | filesystem | set /etc/systemd/journald.conf'
  notify: 'Handlers | journald'
  ansible.builtin.template:
    src: 'journald.conf.j2'
    dest: '/etc/systemd/journald.conf'
    owner: 'root'
    group: 'root'
    mode: '0644'
